<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vídeos com HTML5</title>
</head>
<body>
    <h1>Inserindo Vídeos hospedados Localmente</h1>
    <p>este video esta hospedado no meu próprio servidor.</p>
    <video width="500" controls autoplay loop> <!-- autoplay, controls, loop, muted, poster="imagens/poster.png" -->
        <source src="midias/meu-video.mp4" type="video/mp4"> <!-- MP4 -->
        <source src="midias/meu-video.mkv" type="video/mkv"> <!-- MKV -->
        <source src="midias/meu-video.webm" type="video/webm"> <!-- WEBM -->
        <p>Seu navegador não suporta o elemento de vídeo. <a href="midias/meu-video.mp4">Clique aqui para baixar o arquivo MP4</a></p>
    </video>

    <h1>Inserindo Vídeos do Youtube</h1>
    <iframe width="560" height="315" src="https://www.youtube.com/embed/nRWupmq97gI?si=FA0cPUPo_zleY_yw" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>

    <h1>Inserindo Vídeos do Vimeo</h1>
    <iframe src="https://player.vimeo.com/video/173697483?badge=0&amp;autopause=0&amp;player_id=0&amp;app_id=58479" width="560" height="315" frameborder="0" allow="autoplay; fullscreen; picture-in-picture; clipboard-write; encrypted-media; web-share" referrerpolicy="strict-origin-when-cross-origin" title="Animation Reel"></iframe>
</body>
</html>
