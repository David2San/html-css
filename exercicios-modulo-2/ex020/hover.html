<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplo de Hover</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        div > p {
            display: none;
        } /* Esconde o parágrafo inicialmente */
        div:hover > p {
            display: block;
            color: white;
            background-color: red;
            width: 300px;
        } /* Mostra o parágrafo quando o mouse está sobre a div */
        div:hover {
            color: red;
        } /* Muda a cor do texto da div quando o mouse está sobre ela */

    </style>
</head>
<body>
    <h1>Exemplo de Hover</h1>
    <p>passe o mouse sobre o texto abaixo:</p>
    <div>Passe o mouse aqui
        <p>TEXTO ESCONDIDO...</p>
    </div>
    <p>Fim do exemplo</p>
</body>
</html>
